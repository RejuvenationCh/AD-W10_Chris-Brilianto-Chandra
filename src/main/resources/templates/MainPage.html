<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Elias Vance | Portofolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="navbar-brand fw-bold" href="/">CBC</a>
        <a class="nav-link active" aria-current="page" href="/">Home</a>
        <a class="nav-link" href="/portfolio">Portfolio</a>

      </div>
    </div>
  </div>
</nav>
</div>
    <main class="container py-5">
        <h2 class="mb-4">Selected Works</h2>
        <div class="portfolio-grid">
            <div class="portfolio-item" 
                 th:each="project : ${daftarProyek}" 
                 th:classappend="${project.isPortrait} ? 'portrait' : ''"
                 style="cursor: pointer;"
                 th:onclick="|openLightbox(this, ${project.isPortrait})|"
                 th:data-title="${project.title}"
                 th:data-subtitle="${project.subtitle}"
                 th:data-desc="${project.description}"
                 th:data-img="${project.imageUrl}">
                
                <div class="card border-0 shadow-sm overflow-hidden">
                    <img th:src="@{${project.imageUrl}}" class="card-img-top" alt="Portofolio">
                    <div class="card-img-overlay d-flex flex-column justify-content-end text-white">
                        <h5 class="card-title text-uppercase fw-bold mb-0 lh-1" th:text="${project.title}">Title</h5>
                        <p class="card-text small mb-1 opacity-75" th:text="${project.subtitle}">Subtitle</p>
                        <p class="card-text fw-light lh-sm text-limit-2" style="font-size: 0.8rem;" th:text="${project.description}">Desc</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-dark text-white border-0">
                <div class="modal-body p-3">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>
                    
                    <div class="lightbox-wrapper">
                        <div class="lightbox-img-area">
                            <img src="" id="lightboxImg" class="img-fluid" style="object-fit: contain; max-height: 85vh;" alt="Foto">
                        </div>
                        <div class="lightbox-text-area">
                            <h3 id="lightboxTitle" class="fw-bold text-uppercase mb-1"></h3>
                            <p id="lightboxSubtitle" class="text-secondary mb-3"></p>
                            <hr class="opacity-25">
                            <p id="lightboxDesc" class="fw-light small"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
